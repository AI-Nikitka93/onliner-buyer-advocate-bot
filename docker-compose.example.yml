services:
  onliner-bot:
    build: .
    image: onliner-buyer-advocate-bot:local
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      RUNTIME_STATE_PATH: /data/runtime-state.json
      ENABLE_TELEGRAM_DELIVERY: "false"
      AUTO_PUBLISH_CHANNEL: "false"
    volumes:
      - ./data:/data
    restart: unless-stopped
